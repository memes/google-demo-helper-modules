apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: label-cleanup
  annotations:
    config.kubernetes.io/local-config: "true"
params:
  # The list of CRD names that should have the conversion webhook removed.
  crd_names_to_match:
    - models.kubeai.org
# The set-namespace kpt function adds an erroneous webhook conversion entry to the Model CRD (see
# https://github.com/kptdev/kpt/issues/3560 for details). This starlark script will remove the conversion webhook from
# any CRDs in the stream that match the list of CRD names above.
source: |
  crd_names_to_match = ctx.resource_list["functionConfig"]["params"].get("crd_names_to_match", [])
  if len(crd_names_to_match) > 0:
    for resource in ctx.resource_list["items"]:
      if resource["apiVersion"] == "apiextensions.k8s.io/v1" and resource["kind"] == "CustomResourceDefinition" and resource["metadata"]["name"] in crd_names_to_match:
        _ = resource["spec"].pop("conversion", None)

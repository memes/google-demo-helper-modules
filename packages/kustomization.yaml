apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: packages
  annotations:
    config.kubernetes.io/local-config: "true"
secretGenerator:
  - name: cai-harbor-credentials
    type: Opaque
    options:
      disableNameSuffixHash: true
    envs:
      - .env.cai-harbor-credentials

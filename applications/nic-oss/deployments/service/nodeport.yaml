apiVersion: v1
kind: Service
metadata: # kpt-merge: nginx-ingress/nginx-ingress
  name: nginx-ingress
  namespace: nginx-ingress
  annotations:
    internal.kpt.dev/upstream-identifier: '|Service|nginx-ingress|nginx-ingress'
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: nginx-ingress

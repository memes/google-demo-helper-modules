---
extends: default

# Some upstream manifests shouldn't be linted
ignore:
  - applications/**/upstream/**/*.yaml
  - applications/**/upstream/**/*.yml

rules:
  line-length:
    max: 120
  document-start:
    # Kpt will remove leading '---' post-processing
    ignore: |
      applications/**/*.yaml
      applications/**/Kptfile
  comments:
    # Kpt will reformat inline kpt-set to have a single space before comment
    ignore: |
      applications/ollama/ollama.yaml

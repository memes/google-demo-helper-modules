---
extends: default

# Some upstream manifests shouldn't be linted
ignore:
  - applications/nic-crds/upstream/bases/*.yaml
  - applications/nic-oss/deployments/**/*.yaml
  - applications/nic-plus/deployments/**/*.yaml
  - applications/gcp-otlp-k8s-ingest/upstream/**/*.yaml

rules:
  line-length:
    max: 120
  document-start:
    # Kpt will remove leading '---' post-processing
    ignore: |
      applications/**/*.yaml
      applications/**/Kptfile
